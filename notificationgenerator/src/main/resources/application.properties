# =====================================
# Kafka
# =====================================

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

spring.kafka.consumer.group-id=email-notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

app.kafka.topic=${APP_KAFKA_TOPIC:notification-events}
app.kafka.retry.max-attempts=3
app.kafka.retry.backoff-ms=2000


# =====================================
# Mailtrap SMTP
# =====================================

spring.mail.host=${SPRING_MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${SPRING_MAIL_PORT:2525}

spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================================
# Application Mail Settings
# =====================================

app.mail.from=noreply@notification-service.local
app.mail.subject-prefix=[Notification Process]

# =====================================
# Logging
# =====================================

logging.level.com.notificationapp=DEBUG
logging.level.org.springframework.kafka=INFO